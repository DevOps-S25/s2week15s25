name: wf-cd-release
on:
  push:
    branches:
      - release/**
jobs:
  build-release-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: "${{github.ref}}"
      - name: Build Wesbite With Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./rel-dist" --public-url "./"
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./rel-dist"
          name: "release-build-artifact"
  deploy-release-job:
    needs: "build-release-job"
    runs-on: ubuntu-latest
    environment:
      name: "staging-env"
    permissions:
      id-token: write
      pages: write
    steps:
      - name: Deploy Build Artifacts in "staging-env"
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "release-build-artifact"
          token: "${{github.token}}"