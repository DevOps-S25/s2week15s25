name: wf-cd-release

on:
  pull_request:
    branches:
      - 'release/**'
    types:
      - opened
      - synchronize

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository from GH server
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Currently checked out branch
        run: echo "${{ github.ref }}"

      - name: Lint HTML files with htmlhint
        run: npx htmlhint "**/*.html"

      - name: Lint CSS files with stylelint
        run: npx stylelint "**/*.css"

      - name: Build website with parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist"
