name: wf-cd-release
on:
  pull_request:
    branches:
      - release/**
    types:
      - opened
      - synchronize
jobs:
  linting-job-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository From GH Server
        uses: actions/checkout@v4
        with:
          ref: "${{github.ref}}"
      - name: Currently Checkedout branch
        run: echo "${{github.ref}}"
      - name: Lint HTML Files With HTMLHint
        run: npx htmlhint "**/*.html"
      - name: Lint CSS Files With Stylelint
        run: npx stylelint "**/*.css"
      - name: Build Website With Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"