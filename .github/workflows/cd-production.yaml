name: wf-cd-production

on:
  push:
    branches:
      - production

jobs:
  upload-job-production:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: "${{ github.ref }}"

      - name: Build artifacts with parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"

      - name: Upload build artifacts
        uses: actions/upload-pages-artifacts@v3
        with:
          path: "./dist"
          name: Build-artifact-production

  deploy-job:
    needs: upload-job-production
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: production-env
    steps:
      - name: Deploy build artifacts on GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: Build-artifact-production
          token: ${{ secrets.GITHUB_TOKEN }}