name: wf-cd-production
on:
  push:
    branches:
      - production
jobs:

  upload-job-production:
    runs-on: ubuntu-latest
    steps:
      - name: Chekcout Repo
        uses: actions/checkout@v4
        with:
          ref: "${{github.ref}}"
      - name: Build Artifacts with Parcel
        run: npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"
          name: "build-artifact-production"
  deploy-job-production:
    needs: "upload-job-production"
    runs-on: ubuntu-latest
    permission:
      pages: write
      id-token: write
    environment:
      name: "production-env"
    steps:
      - name: Deploy Build Artifacts on GH Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: "build-artifact-production"
          token: "${{github.token}}"
   












   
